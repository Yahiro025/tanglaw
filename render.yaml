# Render Blueprint — Tanglaw Backend (Express + Prisma)
# Auto-deploys from GitHub on every push to main
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: tanglaw-api
    env: node
    region: singapore  # Closest to Philippines for lowest latency
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: FRONTEND_URL
        sync: false      # Set manually: your Vercel URL (e.g. https://tanglaw.vercel.app)
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false      # Set manually: your Supabase PostgreSQL connection string
      - key: DIRECT_URL
        sync: false      # Set manually: your Supabase direct connection string
      - key: OPENROUTER_API_KEY
        sync: false      # Set manually: OpenRouter API key for LLM
