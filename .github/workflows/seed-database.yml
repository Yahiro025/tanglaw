# Tanglaw — Database Seeder
# Runs prisma db push + seed scripts against Supabase when deploying to Render.
#
# Setup:
#   1. Go to GitHub → Settings → Secrets and variables → Actions
#   2. Add a secret named DATABASE_URL with your Supabase connection string
#      (e.g. postgresql://postgres:password@db.xxxxx.supabase.co:5432/postgres)
#
# Note: ingest-memory.ts (vector store) is NOT run here because
# vector_store.json is committed to git. Run it locally when you add new PDFs:
#   cd backend && DATABASE_URL=... npx tsx scripts/ingest-memory.ts

name: Seed Database

on:
  push:
    branches: [main]
    paths:
      - "backend/prisma/schema.prisma"
      - "backend/prisma/seed.ts"
      - "backend/scripts/ingest-memory.ts"
  workflow_dispatch: # Allow manual triggering

jobs:
  seed:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Push Prisma schema to database
        run: npx prisma db push
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Seed scholarship data
        run: npx tsx prisma/seed.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
